name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A85E7B: ${{ secrets.A85E7B }}
          BD24E9: ${{ secrets.BD24E9 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A85E7B', '')
          bm = os.environ.get('BD24E9', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 4b0ce7aaa7babddef7f89998e4a7577ee7 -->', gm)
          if bm:
              s2 = s2.replace('<!-- 2e0737d34e579af4f1e57b46964dbcffb79ff741b7bfe422 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
